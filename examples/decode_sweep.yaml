metadata:
  name: decode_sweep
  description: Minimal decode sweep example.
  tags: [decode]
  gap: 30
  gpu_frequency:
    min_mhz: 1410
    max_mhz: 1410
    gpu_ids: [0]
  env:
    CUDA_VISIBLE_DEVICES: 0

vars:
  batch_size:
    sweep: [1, 4]

trtllm-bench:
  model: meta-llama/Llama-2-7b-hf
  model_path: /mnt/engines/llama2-7b

  throughput:
    ep: 4
    tp: 4
    warmup: 0
    backend: pytorch
    max_batch_size: "${vars.batch_size}"
    max_num_tokens: "${vars.batch_size * trtllm_bench.throughput.dataset.input_mean + 1}"
    num_requests: 256
    streaming: null
    iteration_log: "${runtime.run_dir}/iter.log"

    dataset:
      root: /mnt/datasets/autobench
      generator: token_norm_dist
      num_requests: 256
      input_mean: 1
      output_mean: 1024
      input_stdev: 0
      output_stdev: 0

    config:
      content:
        cuda_graph_config:
          enable_padding: true
          batch_sizes: [1, "${vars.batch_size}"]
        enable_attention_dp: true
