metadata:
  name: prefill_sweep
  description: Minimal prefill sweep example.
  tags: [prefill]
  gap: 30
  gpu_frequency:
    min_mhz: 1410
    max_mhz: 1410
    gpu_ids: [0]

vars:
  batch_size:
    sweep: [1, 2, 4, 8, 16, 32]

trtllm:
  model: meta-llama/Llama-2-7b-hf
  command: throughput
  model_path: /mnt/engines/llama2-7b

  isl: 1024
  osl: 1
  max_batch_size: "${vars.batch_size}"
  max_num_tokens: "${vars.batch_size * trtllm.osl}"

  dataset:
    root: /mnt/datasets/autobench
    generator: token-norm-dist
    num_requests: 256
    input_mean: "${trtllm.isl}"
    output_mean: "${trtllm.osl}"
    input_stdev: 0
    output_stdev: 0

  config:
    content:
      cuda_graph_config:
        enable_padding: true
        batch_sizes: [1, "${vars.batch_size}"]
